<svg viewBox="0 0 960 560" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="ar" markerWidth="10" markerHeight="8" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#1f6f5c"/>
    </marker>
    <marker id="ar2" markerWidth="10" markerHeight="8" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#c2643f"/>
    </marker>
    <marker id="ar3" markerWidth="10" markerHeight="8" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#0e7490"/>
    </marker>
    <marker id="ar4" markerWidth="10" markerHeight="8" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#7c3aed"/>
    </marker>
  </defs>
  <rect x="6" y="6" width="948" height="548" rx="16" fill="#faf9f5" stroke="#e8e6dc"/>
  <text x="40" y="50" font-size="20" font-weight="700" fill="#141413">Build Great Loop · loop 六件套 + skill-craft</text>

  <!-- top row: author -->
  <rect x="40" y="90" width="240" height="80" rx="12" fill="#ffffff" stroke="#c9d6cf"/>
  <text x="60" y="124" font-size="16" font-weight="700" fill="#1f6f5c">loop-spec</text>
  <text x="60" y="148" font-size="12" fill="#6b7280">画像预填 · 四象限访谈 · 轻量通道</text>

  <rect x="360" y="84" width="240" height="92" rx="12" fill="#e7f0ec" stroke="#1f6f5c" stroke-width="2"/>
  <text x="380" y="116" font-size="16" font-weight="700" fill="#14532d">loop-engineering</text>
  <text x="380" y="138" font-size="12" fill="#3f6b5c">harness：编排/摇测/校准/Deviations</text>
  <text x="380" y="158" font-size="11" fill="#6b7280">停止条件终问 → 交付提示词</text>

  <rect x="680" y="90" width="240" height="80" rx="12" fill="#ffffff" stroke="#c9d6cf"/>
  <text x="700" y="124" font-size="16" font-weight="700" fill="#1f6f5c">loop-eval</text>
  <text x="700" y="148" font-size="12" fill="#6b7280">成功标准 · 黄金集 · 校准协议</text>

  <line x1="280" y1="130" x2="355" y2="130" stroke="#1f6f5c" stroke-width="2" marker-end="url(#ar)"/>
  <line x1="600" y1="130" x2="675" y2="130" stroke="#1f6f5c" stroke-width="2" marker-end="url(#ar)"/>

  <!-- middle row -->
  <rect x="40" y="270" width="240" height="76" rx="12" fill="#ffffff" stroke="#c2643f"/>
  <text x="60" y="302" font-size="15" font-weight="700" fill="#c2643f">loop-review</text>
  <text x="60" y="324" font-size="12" fill="#6b7280">审计加固已有循环</text>

  <rect x="360" y="270" width="240" height="76" rx="12" fill="#ffffff" stroke="#0e7490"/>
  <text x="380" y="302" font-size="15" font-weight="700" fill="#0e7490">loop-ops</text>
  <text x="380" y="324" font-size="12" fill="#6b7280">周期/无人值守运营 · L1→L3</text>

  <rect x="680" y="270" width="240" height="76" rx="12" fill="#fff7ed" stroke="#c2643f" stroke-width="2"/>
  <text x="700" y="302" font-size="15" font-weight="700" fill="#9a3412">loop-retro</text>
  <text x="700" y="324" font-size="12" fill="#6b7280">复盘：证据→修订→gotcha→沉淀判定</text>

  <line x1="160" y1="270" x2="380" y2="180" stroke="#c2643f" stroke-width="2" marker-end="url(#ar2)"/>
  <line x1="480" y1="180" x2="480" y2="265" stroke="#0e7490" stroke-width="2" marker-end="url(#ar3)"/>
  <line x1="600" y1="176" x2="760" y2="265" stroke="#c2643f" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#ar2)"/>
  <text x="640" y="225" font-size="11" fill="#8a8780">跑完说「复盘」</text>

  <!-- bottom: skill-craft sedimentation -->
  <rect x="360" y="430" width="320" height="86" rx="12" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="382" y="464" font-size="16" font-weight="700" fill="#5b21b6">skill-craft</text>
  <text x="382" y="486" font-size="12" fill="#6b7280">skill 全生命周期：创建/修改/诊断/合并/退役</text>
  <text x="382" y="504" font-size="11" fill="#8a8780">机器后端：skill-creator（另装，可选）</text>

  <line x1="770" y1="346" x2="620" y2="430" stroke="#7c3aed" stroke-width="2" marker-end="url(#ar4)"/>
  <text x="700" y="395" font-size="11" fill="#7c3aed">三判据过 → 沉淀为 skill（复利）</text>
  <line x1="360" y1="460" x2="150" y2="350" stroke="#7c3aed" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#ar4)"/>
  <text x="150" y="415" font-size="11" fill="#7c3aed">skill 反哺：好 skill 让下一个 loop 更强</text>

  <text x="40" y="540" font-size="12" fill="#8a8780">spec → engineering → eval 造循环 · review 审 · ops 运营 · retro 复盘 → skill-craft 沉淀 —— 一次性工作变复利资产</text>
</svg>
